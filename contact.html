<body>
  <div class="bg-fixed"></div>
  <!-- Header will be inserted by header.js -->

  <div class="main-content">
    <div class="container-wide">
      <h1 class="page-title">Contact</h1>
      <p class="page-subtitle">Every great sound starts with a conversation.</p>

      <div class="article-content">
        <form class="contact-form" action="https://formspree.io/f/xgonoazl" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email address" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="What kind of sound are you chasing?" rows="6" required></textarea>
          </div>
          <button type="submit" class="contact-submit">Send Message</button>
        </form>
      </div>
    </div>
  </div>
