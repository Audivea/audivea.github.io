<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audivea Products</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLL7X7X53H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JLL7X7X53H');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../icon.png" type="image/png">

  <!-- Common styles -->
  <link rel="stylesheet" href="../components/styles.css">

  <!-- Component scripts -->
  <script src="../components/header.js"></script>
  <script src="../components/footer.js"></script>

  <style>
    .container {
      width: 800px;
      max-width: 90%;
      margin: 0 auto;
    }
    .page-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #00aaff;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
      letter-spacing: 0.05em;
    }
    .page-subtitle {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 2rem;
      color: #aaa;
      text-align: center;
    }
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .product-card {
      background-color: rgba(20, 20, 30, 0.7);
      border-radius: 8px;
      padding: 1.5rem;
      transition: transform 0.3s ease, background-color 0.3s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 170, 255, 0.2);
    }
    .product-card:hover {
      transform: translateY(-5px);
      background-color: rgba(25, 25, 40, 0.8);
    }
    .product-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #00aaff;
      text-shadow: 0 0 8px rgba(0, 170, 255, 0.4);
    }
    .product-excerpt {
      color: #fff;
      margin-bottom: 1rem;
      line-height: 1.6;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }
    .learn-more {
      display: inline-block;
      color: #00aaff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .learn-more:hover {
      color: #33cfff;
      text-decoration: underline;
    }

    .article-flex-container {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .article-image {
      width: 180px;
      height: auto;
      border-radius: 6px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .article-flex-container {
        flex-direction: column;
      }
      .article-image {
        width: 100%;
        max-width: 400px;
        margin-bottom: 1rem;
      }
      .product-excerpt {
        -webkit-line-clamp: 3;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <!-- Header will be inserted by header.js -->

  <div class="main-content">
    <div class="container">
      <h1 class="page-title">Products</h1>
      <p class="page-subtitle">Tools for sound ready to ascend.</p>

      <div class="product-list">
        <div class="product-card">
          <div class="article-flex-container">
            <img src="coming-soon.png" alt="Coming Soon" class="article-image">
            <div>
              <h2 class="product-title">Something New Is on the Way</h2>
              <p class="product-excerpt">
                We're working on something. Stay tuned for updates.
              </p>
              <a href="coming-soon.html" class="learn-more">Learn More →</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer will be inserted by footer.js -->
</body>
</html>
